<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie Genre Classifier</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">

        <h1>🎬 AI Movie Genre Classifier</h1>

        <form method="POST">

            <textarea
                name="description"
                placeholder="Enter movie description here..."
                required
            ></textarea>

            <button type="submit">
                Predict Genre
            </button>

        </form>

        {% if prediction %}

        <div class="result">
            🎥 Predicted Genre:
            <span>{{ prediction }}</span>
        </div>

        {% endif %}

    </div>

</body>
</html>
