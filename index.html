<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spam SMS Detector</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <p class="subtitle">
    AI-powered machine learning system that intelligently detects 
    spam SMS messages with high accuracy.
</p>
</head>

<body>

    <div class="container">

        <h1>AI Spam SMS Detector</h1>

        <p class="subtitle">
            Detect whether a message is Spam or Not Spam using Machine Learning
        </p>

        <form action="/predict" method="POST">

            <textarea
                name="message"
                placeholder="Enter your SMS message here..."
                required></textarea>

            <button type="submit">
                Detect Message
            </button>

        </form>

        {% if prediction %}

        <div class="result">
            {{ prediction }}
        </div>

        {% endif %}

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
